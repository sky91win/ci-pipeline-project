name: Java CI Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: springboot-app
  IMAGE_TAG: ${{ github.sha }}
  AWS_REGION: us-east-1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      #################################################
      # Checkout
      #################################################
      - name: Checkout Code
        uses: actions/checkout@v4

      #################################################
      # Java Setup
      #################################################
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      #################################################
      # Verify Project Structure
      #################################################
      - name: Verify Project Structure
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f

      #################################################
      # Build & Unit Test
      #################################################
      - name: Build & Unit Test
        run: mvn clean verify

      #################################################
      # SonarQube Scan
      #################################################
      - name: SonarQube Scan
        run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
            -Dsonar.projectKey=ci-pipeline-project \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      #################################################
      # Install Trivy
      #################################################
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version

      #################################################
      # Trivy Filesystem Scan
      #################################################
      - name: Trivy Filesystem Scan
        run: |
          trivy fs . \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table

      #################################################
      # Build Docker Image
      #################################################
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

      #################################################
      # Verify Docker Image
      #################################################
      - name: Verify Docker Image
        run: docker images

      #################################################
      # Trivy Image Scan
      #################################################
      - name: Trivy Image Scan
        run: |
          trivy image $IMAGE_NAME:$IMAGE_TAG \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table

      #################################################
      # Configure AWS Credentials
      #################################################
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      #################################################
      # Login to Amazon ECR
      #################################################
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      #################################################
      # Verify ECR Variables
      #################################################
      - name: Verify ECR Variables
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          echo "Registry=$REGISTRY"
          echo "Repository=$REPOSITORY"

      #################################################
      # Tag Docker Image
      #################################################
      - name: Tag Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker tag $IMAGE_NAME:latest $REGISTRY/$REPOSITORY:latest

      #################################################
      # Push Docker Images
      #################################################
      - name: Push Docker Images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest